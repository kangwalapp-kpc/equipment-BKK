    <style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }
        .iphone-15-container { width: 100vw; max-width: 500px; height: 100vh; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        header { flex-shrink: 0; }
        .category-scroll { flex-shrink: 0; display: flex; overflow-x: auto; white-space: nowrap; padding: 10px; gap: 8px; scrollbar-width: none; background: #fff; border-bottom: 1px solid #f3f4f6; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; padding-bottom: 100px; /* เว้นที่ให้ปุ่มลอย */ }
        
/* 1. ปุ่มสลับมุมมอง (น้ำเงิน) - อยู่บนสุด */
.fab {
  position: absolute;
  bottom: 140px; /* ขยับขึ้นไปชั้นบน */
  right: 20px;
  width: 50px;
  height: 50px;
  background-color: #2563eb; 
  color: white;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 100;
  border: none;
}

/* 2. ปุ่ม Export PDF (แดง) - อยู่ตรงกลาง */
.pdf-btn {
  position: absolute;
  bottom: 80px; /* อยู่ระหว่างปุ่มน้ำเงินและเขียว */
  right: 20px;
  width: 50px;
  height: 50px;
  background-color: #ef4444; /* สีแดง PDF */
  color: white;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 100;
  border: none;
}
/* ปรับแต่งช่อง Input ให้ดูเนียนตา */
#searchInput {
    -webkit-appearance: none; /* สำหรับ iOS */
}

/* ปรับระยะห่างระหว่างเลขกล่องกับช่องค้นหา */
.category-scroll {
    border-bottom: none; /* ลบเส้นใต้เลขกล่องออก เพราะจะมีช่องค้นหามาคั่นแทน */
}
.category-scroll {
    /* ... โค้ดเดิมของคุณ ... */
    scroll-behavior: smooth; /* ทำให้เวลาเลื่อนแล้วดูนุ่มนวลขึ้น */
    cursor: grab; /* เปลี่ยนสัญลักษณ์เม้าส์ให้เป็นรูปมือ (เผื่อคนอยากคลิกค้างแล้วลาก) */
}

.category-scroll:active {
    cursor: grabbing; /* ตอนคลิกค้างให้เป็นรูปมือกำ */
}
/* ปรับขนาดปุ่มเลขกล่องให้เล็กลงนิดนึงจะได้ไม่เกะกะ */
.category-btn {
    padding: 4px 12px;
    font-size: 12px;
}
/* 3. ปุ่มเพิ่มข้อมูล (เขียว) - อยู่ล่างสุด */
.add-float-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: #27ae60;
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 100;
  border: none;
}
        
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .list-view { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .image-container { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
      
/* จัดวางตำแหน่งเลขกล่องให้อยู่มุมซ้ายบนของรูป */
.badge-box {
    position: absolute;
    top: 5px;   /* ขยับขึ้นไปอีกนิด */
    left: 5px;  /* ขยับไปทางซ้ายอีกหน่อย */
    background: rgba(37, 99, 235, 0.85); /* จางลงนิดนึงเพื่อให้เห็นรูปข้างหลัง */
    color: white;
    font-size: 8px; /* ปรับขนาดตัวอักษรให้เล็กลงหน่อยสำหรับจอ 3 คอลัมน์ */
    font-weight: bold;
    padding: 2px 6px; 
    border-radius: 4px; /* มนน้อยลงหน่อยให้ดูคม */
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 3px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
      /* เพิ่มระยะเว้นช่วงล่างให้ Modal ดูโปร่งขึ้น */
.modal-content-wrapper {
    padding-bottom: 2.5rem; /* เพิ่มระยะห่างด้านล่าง */
}
/* เพิ่มระยะ Safe Area สำหรับมือถือรุ่นใหม่ */
#detailModal .p-8 {
    padding-bottom: calc(2.5rem + env(safe-area-inset-bottom));
}

/* ปรับความนุ่มนวลของเงา */
.shadow-blue-200 {
    box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.2);
}

.shadow-green-100 {
    box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.15);
}

/* ปรับ Scrollbar ของ Modal ให้ดูสะอาด */
.overflow-y-auto::-webkit-scrollbar {
    width: 0px;
}
      
/* ปรับให้ปุ่มมีระยะห่างจากขอบมากขึ้น */
#actionButtons {
    margin-top: 1.5rem;
    padding-bottom: 1rem;
}

/* ปรับปรุง Delete Button ให้ดูเบาลง ไม่แย่งสายตามากเกินไป */
#deleteContainer {
    margin-top: 1rem;
    margin-bottom: 1rem;
    border-top: 1px solid #f3f4f6;
}

/* ปรับ CSS ของ badge-reserve (คงเหลือ) ให้ดูสมดุลขึ้น */
.badge-reserve {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7); /* สีดำโปร่งแสง */
    color: white;
    font-size: 9px;
    padding: 4px;
    text-align: center;
    font-weight: bold;
}
        
        .category-btn { padding: 6px 15px; border-radius: 50px; font-size: 13px; transition: all 0.2s; border: 1px solid #e5e7eb; } 
        .btn-active { background-color: #2563eb; color: white; border-color: #2563eb; font-weight: bold; }
        .btn-inactive { background-color: #f3f4f6; color: #4b5563; }
        
        footer { position: absolute; bottom: 0; left: 0; right: 0; background-color: #2563eb; color: white; text-align: center; padding: 10px; font-size: 0.75rem; z-index: 40; }

      /* แก้ไขตัวแจ้งเตือน (Toast) ให้แสดงผลหน้าสุด */
/* ตัวแจ้งเตือน Toast */
#toast {
    position: fixed;
    top: 20px;                  /* ระยะจากขอบบน */
    left: 50%;
    transform: translateX(-50%);
    background-color: #064e3b;  /* สีเขียวเข้มแบบในรูป */
    color: white;
    padding: 10px 25px;
    border-radius: 12px;        /* ความมนของขอบ */
    font-size: 14px;
    font-weight: 500;
    z-index: 9999 !important;   /* ให้สูงกว่า Modal ทุกตัว */
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: opacity 0.3s ease-in-out;
    pointer-events: none;       /* ไม่ให้ขวางการคลิกส่วนอื่น */
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 200px;
}

/* ตั้งค่า Modal ให้ z-index ต่ำกว่า Toast */
.modal-overlay, #detailModal, #addModal, #deleteConfirmModal {
    z-index: 1000; 
}

<script>
let data = [];
let currentFilter = "All";
let currentView = 'grid'; 
let currentQty = 1;
let currentItemData = null;

const API_URL = "https://script.google.com/macros/s/AKfycbwsz7JpaMm8oun368pgcLvitPPjoFrbrSB6gXZp6Zcsz3saXnhnBLqk1ivcYeIMpFI0/exec";

function getDriveImageUrl(url) {
    if (!url || url.includes('placehold.co')) return url;
    const match = url.match(/[-\w]{25,}/);
    if (match && url.includes('drive.google.com')) {
        return `https://drive.google.com/thumbnail?sz=w1000&id=${match[0]}`;
    }
    return url;

async function loadData() {
    const container = document.getElementById('content');
    try {
        const res = await fetch(API_URL + "?action=getData");
        const json = await res.json();
        data = json.map(item => ({
            title: item.name || "-",
            img: getImageUrl(item.img), 
            category: item.category || "อื่นๆ",
            qty: Number(item.qty) || 0,
            assetInfo: item.assetInfo || "-",  
            desc: item.remark || "",
            id: item.id
        }));

        // ส่วนที่เหลือคงเดิม...
        data.sort((a, b) => {
            return String(a.category).localeCompare(String(b.category), undefined, { numeric: true });
        });
        
        const categories = ["All", ...new Set(data.map(i => i.category))];
        renderCategoryButtons(categories);
        if (!categories.includes(currentFilter)) currentFilter = "All";
        filterData(currentFilter);

    } catch (error) {
        container.innerHTML = "<p class='text-center p-10 text-red-500'>โหลดข้อมูลไม่สำเร็จ</p>";
    }
}

async function saveEdit() {
    const nameInput = document.getElementById('editNameInput');
    const descInput = document.getElementById('editDescInput');
    const catInput = document.getElementById('editCategoryInput');
    const assetInput = document.getElementById('editAssetInfoInput');
    const fileInput = document.getElementById('editImgFile');

    if (!nameInput || !nameInput.value) return alert("กรุณาใส่ชื่ออุปกรณ์");

    showToast("กำลังบันทึกข้อมูล...", 0); 
    
    let base64Data = "";
    let fileName = "";
    const file = fileInput ? fileInput.files[0] : null;

    try {
        if (file) {
            // ปรับคุณภาพเป็น 0.85 ตามที่คุณเคยตั้งค่าไว้เพื่อให้รูปชัดขึ้น
            base64Data = await resizeImage(file, 500); // เพิ่มขนาดเล็กน้อยเพื่อให้ชัดเจน
            fileName = file.name;
        }

        const payload = {
            action: "updateItemFull",
            id: currentItemData.id,
            name: nameInput.value,
            category: catInput ? catInput.value : currentItemData.category,

        });
        
        const resultText = await res.text();

        if (resultText.toLowerCase().includes("success")) {
            showToast("✅ อัปเดตข้อมูลเรียบร้อยแล้ว", 2000);

        }
    } catch (e) {

    }
}
function resizeImage(file, maxSide = 400) { // เปลี่ยนเป็นคุมด้านที่ยาวที่สุด
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                
                // คำนวณหาด้านที่ยาวที่สุด เพื่อปรับสัดส่วน
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxSide) {
                        height *= maxSide / width;
                        width = maxSide;
                    }
                } else {
                    if (height > maxSide) {
                        width *= maxSide / height;
                        height = maxSide;
                    }
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, width, height);
                
                // บีบคุณภาพลงมาที่ 0.5 เพื่อความชัวร์สำหรับรูปที่รายละเอียดเยอะแบบนี้
                const base64 = canvas.toDataURL('image/jpeg', 0.8); 
                const finalString = base64.split(',')[1];

                console.log("ขนาดที่ส่งไป (กว้างxสูง):", width, "x", height);
                console.log("ความยาว Base64:", finalString.length);
                
                resolve(finalString);
            };
        };
    });
}

function filterData(selectedCat) {
    currentFilter = selectedCat; // เก็บหมวดหมู่ปัจจุบันไว้
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    // กรองข้อมูลโดยเช็คทั้ง หมวดหมู่ และ คำค้นหา
    const filtered = data.filter(item => {
        const matchesCat = (selectedCat === "All" || String(item.category) === String(selectedCat));
        const matchesName = item.title.toLowerCase().includes(searchTerm);
        return matchesCat && matchesName;
    });

    renderFilteredItems(filtered);
}

function showToast(msg, duration = 2500) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    
    // แสดง Toast
    toast.classList.remove("opacity-0");
    toast.classList.add("opacity-100");

    // ถ้าส่ง duration เป็น 0 คือให้ค้างไว้ (ใช้ตอนกำลังบันทึก)
    // แต่ถ้ามี duration ให้ตั้งเวลาปิดอัตโนมัติ
    if (duration > 0) {
        setTimeout(() => {
            toast.classList.replace("opacity-100", "opacity-0");
        }, duration);
    }
}

    document.getElementById('addAssetInfo').value = ""; // ล้างค่าแผนก/หมายเลขทรัพย์สิน
    document.getElementById('addQty').value = "1";
    document.getElementById('addRemark').value = "";
    document.getElementById('addImgFile').value = "";
    document.getElementById('addImgPreviewContainer').classList.add('hidden');
    document.getElementById('addFileNameDisplay').innerText = "เลือกรูปภาพ";
    updateCategoryDropdown(); 
    hideNewCategoryInput();  
    document.getElementById('addModal').classList.remove('hidden');
}

function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
function checkCloseAdd(e) { if (e.target.id === "addModal") closeAddModal(); }

// ดูตัวอย่างรูปก่อนอัปโหลด
function previewAddImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('addImgPreview').src = e.target.result;
            document.getElementById('addImgPreviewContainer').classList.remove('hidden');
            document.getElementById('addFileNameDisplay').innerText = input.files[0].name;
        }
        reader.readAsDataURL(input.files[0]);
    }
}

async function submitNewItem() {
    // 1. ดึงค่าตาม ID เดิมในหน้า HTML ของคุณ
    const name = document.getElementById('addName').value;
    const categoryInput = document.getElementById('addCategory').value; 
    const categorySelect = document.getElementById('addCategorySelect').value; 
    const category = categoryInput || categorySelect; 
    const assetInfo = document.getElementById('addAssetInfo').value; 
    const qty = document.getElementById('addQty').value;
    const remark = document.getElementById('addRemark').value;
    const fileInput = document.getElementById('addImgFile');
    const file = fileInput.files[0];

    // ตรวจสอบค่าว่างเบื้องต้น
    if (!name) return alert("กรุณาใส่ชื่ออุปกรณ์");
    if (!category) return alert("กรุณาระบุเลขกล่องหรือหมวดหมู่");

    // 2. แสดง Toast ค้างไว้ (หน้าสุด)
    showToast("กำลังบันทึกข้อมูล...", 0); 
    
    let base64Data = "";

    try {
        // ย่อรูปภาพ
        if (file) {
            base64Data = await resizeImage(file, 500); 
        }

        const payload = {
            action: "addItem", 
            name: name,
            category: category,
            qty: qty,
            remark: remark,
            assetInfo: assetInfo, 
            imageDate: base64Data, 
            imageName: file ? file.name : ""
        };

        const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        const resultText = await res.text();
        
        // 3. ตรวจสอบผลลัพธ์
        if (resultText.toLowerCase().includes("success")) {
            showToast("✅ เพิ่มรายการเรียบร้อยแล้ว", 2500);
            
            // ล้างค่าฟอร์ม และปิด Modal
            closeAddModal();
            loadData(); 
            
            // ล้างค่าใน Input (Optional)
            document.getElementById('addName').value = "";
            document.getElementById('addQty').value = "";
            document.getElementById('addRemark').value = "";
            document.getElementById('addImgFile').value = "";
        } else {
            hideToast(); // ปิด Toast ก่อนโชว์ Alert
            alert("เกิดข้อผิดพลาดจาก Server: " + resultText);
        }
    } catch (e) {
        hideToast();
        console.error("Fetch Error:", e);
        alert("การเชื่อมต่อขัดข้อง: " + e.message);
    }
}
// ฟังก์ชันจัดการแถบ Category Scroll (Mouse Wheel & Drag)
const categoryBarEl = document.getElementById('categoryBar');

categoryBarEl.addEventListener('wheel', (e) => {
    if (e.deltaY !== 0) {
        e.preventDefault();
        categoryBarEl.scrollLeft += e.deltaY;
    }
}, { passive: false });

let isDown = false;
let startX;
let scrollLeft;

categoryBarEl.addEventListener('mousedown', (e) => {
    isDown = true;
    startX = e.pageX - categoryBarEl.offsetLeft;
    scrollLeft = categoryBarEl.scrollLeft;
});

categoryBarEl.addEventListener('mouseleave', () => { isDown = false; });
categoryBarEl.addEventListener('mouseup', () => { isDown = false; });
categoryBarEl.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - categoryBarEl.offsetLeft;
    const walk = (x - startX) * 2;
    categoryBarEl.scrollLeft = scrollLeft - walk;
});

// เริ่มโหลดข้อมูลครั้งแรก
loadData();
</script>
